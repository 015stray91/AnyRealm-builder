name: AnyRealm CI/CD Build & Compile

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install System Dependencies for Native Modules
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libkrb5-dev python3

    - name: Install Root Dependencies & Build Web App
      run: |
        npm install
        npm run build

    - name: Install & Compile VS Code Extension
      run: |
        cd vscode-extension
        npm install
        npm run compile

    - name: Upload Web App Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: anyrealm-web-dist
        path: dist/

    - name: Upload VS Code Extension Artifact
      uses: actions/upload-artifact@v4
      with:
        name: anyrealm-vscode-extension
        path: |
          vscode-extension/out/
          vscode-extension/package.json
          vscode-extension/extension.ts
